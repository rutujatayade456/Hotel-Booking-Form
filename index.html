<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Rutuja Palace</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Header Section -->
<div class="header">
  <div class="header-content">
    <h1>Hotel Rutuja Palace</h1>
    <p>Khamgaon, 444303 | rutuja.palacehotel@gmail.com | +91 9209165350</p>
  </div>
</div>

<!-- Form Section -->
<div class="form-section">
  <h2>Hotel Booking Form</h2>
  <p>Please fill out the form below to complete your reservation.</p>

  <!-- FORM START -->
  <form action="https://formspree.io/f/xpqjeggp" method="POST">

    <label>First Name *</label>
    <input type="text" name="firstName" required>

    <label>Last Name *</label>
    <input type="text" name="lastName" required>

    <label>Email *</label>
    <input type="email" name="email" required>

    <label>Phone Number *</label>
    <input type="tel" name="phone" required>

    <label>Room Type *</label>
    <div class="radio-group">
      <label>
        <span>Single Room</span>
        <input type="radio" name="roomType" value="Single Room" required>
      </label>

      <label>
        <span>Double Room</span>
        <input type="radio" name="roomType" value="Double Room">
      </label>

      <label>
        <span>Suite</span>
        <input type="radio" name="roomType" value="Suite">
      </label>

      <label>
        <span>Family Room</span>
        <input type="radio" name="roomType" value="Family Room">
      </label>
    </div>


    <button type="submit">Submit Booking</button>

  </form>
  <!-- FORM END -->

</div>

<!-- WhatsApp Special Section (Outside Form) -->
<div class="special-section">
  <h3>Send Us a Special Message on WhatsApp</h3>

  <textarea id="specialMessage" placeholder="Write your message here..."></textarea>

  <button type="button" onclick="sendWhatsApp()">
    Send via WhatsApp
  </button>
</div>

<!-- Popup -->
<div id="popup" class="popup">
  Booking Submitted Successfully 🎉
</div>

<script src="script.js"></script>

</body>
</html>
